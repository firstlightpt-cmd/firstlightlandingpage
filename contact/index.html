  <header class="site-header">
    <div class="header-veil" aria-hidden="true"></div>

        <a class="nav-link" href="/trips/">Our Trips</a>

  <div class="mobile-menu" data-menu>
    <nav>

        <!-- vier schwebende Fotos in den Ecken -->
        <div class="photo float-a"><img src="/assets/web-ph-wave-carve.jpg" alt=""></div>
        <div class="photo float-b"><img src="/assets/web-ph-contact-1.jpg" alt=""></div>
        <div class="photo float-c"><img src="/assets/web-ph-galicia-1.jpg" alt=""></div>
        <div class="photo float-d"><img src="/assets/web-ph-contact-2.jpg" alt=""></div>

        <!-- Kontakt-Inhalt. E-Mail-Adresse im href="mailto:…" ändern. -->
        <div class="contact-box">

          <h1 class="section-head">Contact.</h1>
          <p>Questions, ideas, or just want to come along? Reach out.</p>
          <a class="btn" href="mailto:firstlightgang@gmail.com?subject=Hello%20First%20Light">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2.5"></rect><path d="M3.5 7l8.5 6 8.5-6"></path></svg>

          </a>
